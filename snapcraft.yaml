name: redstone-launcher
base: core22
version: '1.14.0'
summary: Redstone Launcher for Linux
description: |
  Unofficial Minecraft Launcher.

grade: stable
confinement: strict

parts:
  redstone:
    plugin: nil
    source: .
    override-build: |
      # This ensures the robot uses the Node 20 we install below
      export PATH=/snap/bin:$PATH
      npm install
      npm run buildLinux
      cp -av dist/linux-unpacked/* $SNAPCRAFT_PART_INSTALL/
    build-packages:
      - nodejs
      - npm
    build-snaps:
      - node/20/stable
    stage-packages:
      - libnss3
      - libnspr4
      - libasound2
      - libvips42
      - libvips-cpp42

apps:
  redstone-launcher:
    command: redstone-launcher --no-sandbox
    extensions: [gnome]
    plugs:
      - network
      - network-bind
      - opengl
      - x11
      - browser-support
