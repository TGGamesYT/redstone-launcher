name: Bug Report
description: Report a bug to help us improve Redstone Launcher!
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "### Thank you for reporting a bug!"
  - type: input
    id: version
    attributes:
      label: Launcher Version
      placeholder: "e.g. v1.19.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows 10
        - Windows 11
        - MacOS
        - Linux
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened?
    validations:
      required: true
