<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redstone Launcher - Admin Panel</title>
  <link rel="stylesheet" href="server.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--very-dark);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: var(--text-font), sans-serif;
    }

    #toolbar {
      background: var(--secondary-color);
      padding: 0;
      display: flex;
      align-items: center;
      height: 50px;
      border-bottom: 2px solid var(--border-dark);
      gap: 10px;
      flex-shrink: 0;
      -webkit-app-region: drag;
    }

    .drag-region {
      flex: 1;
      display: flex;
      align-items: center;
      font-weight: bold;
      font-size: 1em;
      padding-left: 15px;
    }

    .toolbar-buttons {
      display: flex;
      gap: 5px;
      padding-right: 10px;
      -webkit-app-region: no-drag;
    }

    .toolbar-buttons button {
      background: transparent;
      border: none;
      color: var(--text-color);
      cursor: pointer;
      font-size: 1.2em;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .toolbar-buttons button:hover {
      background: rgba(0, 0, 0, 0.2);
    }

    .toolbar-buttons button:active {
      background: rgba(0, 0, 0, 0.4);
    }

    #scroll-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .admin-container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 30px;
      border-bottom: 2px solid var(--base-color);
      padding-bottom: 10px;
    }

    .section {
      margin-bottom: 40px;
      background: color-mix(in srgb, var(--secondary-color) 50%, black);
      padding: 20px;
      border-radius: var(--border-radius);
      border: 1px solid var(--border-dark);
    }

    .section h2 {
      margin-top: 0;
      color: var(--base-color);
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 8px;
      background: var(--very-dark);
      color: var(--text-color);
      border: 1px solid var(--border-dark);
      border-radius: 4px;
      box-sizing: border-box;
      font-family: inherit;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    button {
      background: var(--base-color);
      color: var(--text-color);
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }

    button:hover {
      background: var(--third-color);
    }

    button.danger {
      background: #a30000;
    }

    button.danger:hover {
      background: #d92d2d;
    }

    .notification-item {
      background: var(--very-dark);
      padding: 15px;
      margin-bottom: 10px;
      border-left: 3px solid var(--base-color);
      border-radius: 4px;
    }

    .notification-item h3 {
      margin: 0 0 5px 0;
    }

    .notification-item p {
      margin: 5px 0;
      font-size: 0.9em;
    }

    .notification-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .stat-card {
      background: var(--very-dark);
      padding: 15px;
      border-radius: 4px;
      border: 1px solid var(--border-dark);
      text-align: center;
    }

    .stat-card .number {
      font-size: 2em;
      font-weight: bold;
      color: var(--base-color);
    }

    .stat-card .label {
      font-size: 0.9em;
      color: #aaa;
    }

    .button-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    #notificationsList {
      max-height: 300px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <div class="drag-region">Redstone Launcher — Admin Panel</div>
    <div class="toolbar-buttons">
      <button id="min-btn" title="Minimize">—</button>
      <button id="max-btn" title="Maximize">◻</button>
      <button id="close-btn" title="Close">✕</button>
    </div>
  </div>

  <div id="scroll-container">
    <div class="admin-container">
      <h1>Admin Control Panel</h1>

    <div class="section">
      <h2>Statistics</h2>
      <div class="notification-stats">
        <div class="stat-card">
          <div class="number" id="totalNotifications">0</div>
          <div class="label">Total Notifications</div>
        </div>
        <div class="stat-card">
          <div class="number" id="totalDismissals">0</div>
          <div class="label">Total Dismissals</div>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Create Notification</h2>
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="notificationTitle" placeholder="Enter notification title">
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea id="notificationMessage" placeholder="Enter notification message"></textarea>
      </div>
      <div class="form-group">
        <label>More Info URL (optional)</label>
        <input type="text" id="notificationUrl" placeholder="https://example.com">
      </div>
      <button onclick="createNotification()">Create Notification</button>
    </div>

    <div class="section">
      <h2> Active Notifications</h2>
      <div id="notificationsList"></div>
    </div>    </div>  </div>

  <script>
    const { ipcRenderer } = require('electron');

    async function loadStats() {
      const stats = await ipcRenderer.invoke('get-notification-stats');
      document.getElementById('totalNotifications').textContent = stats.totalNotifications;
      document.getElementById('totalDismissals').textContent = 
        stats.dismissalStats.reduce((sum, n) => sum + n.totalDismissals, 0);
    }

    async function loadNotifications() {
      const notifications = await ipcRenderer.invoke('get-all-notifications');
      const container = document.getElementById('notificationsList');
      container.innerHTML = '';

      if (notifications.length === 0) {
        container.innerHTML = '<p style="color: #aaa;">No notifications yet</p>';
        return;
      }

      notifications.forEach(notif => {
        const date = new Date(notif.createdAt).toLocaleString();
        const div = document.createElement('div');
        div.className = 'notification-item';
        div.innerHTML = `
          <h3>${notif.title}</h3>
          <p>${notif.message}</p>
          ${notif.moreInfoUrl ? `<p><a href="${notif.moreInfoUrl}" style="color: var(--base-color);">More Info</a></p>` : ''}
          <p style="font-size: 0.8em; color: #888;">Created: ${date}</p>
          <button class="danger" onclick="deleteNotification('${notif.id}')">Delete</button>
        `;
        container.appendChild(div);
      });
    }

    function createNotification() {
      const title = document.getElementById('notificationTitle').value.trim();
      const message = document.getElementById('notificationMessage').value.trim();
      const url = document.getElementById('notificationUrl').value.trim();

      if (!title || !message) {
        alert('Title and message are required');
        return;
      }

      ipcRenderer.send('create-notification', {
        title,
        message,
        moreInfoUrl: url || null
      });

      document.getElementById('notificationTitle').value = '';
      document.getElementById('notificationMessage').value = '';
      document.getElementById('notificationUrl').value = '';

      setTimeout(() => {
        loadNotifications();
        loadStats();
      }, 100);
    }

    function deleteNotification(id) {
      if (confirm('Delete this notification?')) {
        ipcRenderer.send('delete-notification', id);
        setTimeout(() => {
          loadNotifications();
          loadStats();
        }, 100);
      }
    }

    loadStats();
    loadNotifications();

    document.getElementById('min-btn').onclick = () => ipcRenderer.send('min-app');
    document.getElementById('max-btn').onclick = () => ipcRenderer.send('max-app');
    document.getElementById('close-btn').onclick = () => ipcRenderer.send('close-app');

    ipcRenderer.on('window-maximized', () => {
      document.getElementById('max-btn').innerHTML = '☐';
    });

    ipcRenderer.on('window-unmaximized', () => {
      document.getElementById('max-btn').textContent = '◻';
    });
  </script>
</body>
</html>
